<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}snickr{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f4; color: #1a1a1a; }

    nav {
      background: #4a154b; color: #fff; padding: 0 1.5rem;
      display: flex; align-items: center; gap: 1.25rem; height: 50px;
      position: sticky; top: 0; z-index: 100;
    }
    nav .brand { font-weight: 700; font-size: 1.15rem; letter-spacing: -0.5px; text-decoration: none; color: #fff; }
    nav a { color: #d4b8d6; text-decoration: none; font-size: 0.875rem; white-space: nowrap; }
    nav a:hover { color: #fff; }
    nav .spacer { flex: 1; }
    nav .search-form { display: flex; align-items: center; gap: .35rem; }
    nav .search-form input {
      padding: .3rem .65rem; border-radius: 4px; border: none;
      font-size: .85rem; width: 200px; background: rgba(255,255,255,.15);
      color: #fff;
    }
    nav .search-form input::placeholder { color: rgba(255,255,255,.55); }
    nav .search-form input:focus { outline: none; background: rgba(255,255,255,.25); }
    nav .search-form button {
      padding: .3rem .65rem; font-size: .82rem; margin-top: 0;
      background: rgba(255,255,255,.18); border: none; border-radius: 4px;
      color: #fff; cursor: pointer;
    }
    nav .search-form button:hover { background: rgba(255,255,255,.28); }
    nav .nav-user { font-size: .82rem; color: rgba(255,255,255,.6); }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1.25rem; }

    .breadcrumb {
      font-size: .82rem; color: #888; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
    }
    .breadcrumb a { color: #666; text-decoration: none; }
    .breadcrumb a:hover { color: #4a154b; }
    .breadcrumb .sep { color: #bbb; }

    .card {
      background: #fff; border-radius: 8px; padding: 1.75rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    h1 { font-size: 1.45rem; margin-bottom: 1.1rem; }
    h2 { font-size: 1.1rem; margin-bottom: .85rem; }

    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; margin-top: .9rem; }
    input[type=text], input[type=email], input[type=password] {
      width: 100%; padding: .55rem .75rem; border: 1px solid #ccc;
      border-radius: 5px; font-size: .95rem;
    }
    input:focus { outline: 2px solid #4a154b; border-color: transparent; }

    button, .btn {
      display: inline-block; margin-top: 1.1rem; padding: .55rem 1.3rem;
      background: #4a154b; color: #fff; border: none; border-radius: 5px;
      font-size: .9rem; cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    button:hover, .btn:hover { background: #3a1039; }
    .btn-secondary { background: #e8e8e8; color: #333; }
    .btn-secondary:hover { background: #d8d8d8; }
    .btn-danger { background: #fdecea; color: #a8200a; }
    .btn-danger:hover { background: #f5c6c0; }

    .alert-error {
      background: #fdecea; border: 1px solid #f5c6c0; color: #a8200a;
      border-radius: 5px; padding: .6rem .9rem; margin-bottom: 1rem; font-size: .875rem;
    }
    .alert-success {
      background: #e6f4ea; border: 1px solid #b7dfbe; color: #1a6b2e;
      border-radius: 5px; padding: .6rem .9rem; margin-bottom: 1rem; font-size: .875rem;
    }

    .muted { color: #777; font-size: .875rem; }
    .badge {
      display: inline-block; font-size: .75rem; border-radius: 4px;
      padding: 1px 7px; vertical-align: middle;
    }
    .badge-purple { background: #4a154b; color: #fff; }
    .badge-gray   { background: #e8e8e8; color: #555; }
    .badge-green  { background: #e6f4ea; color: #1a6b2e; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: .5rem .75rem; border-bottom: 2px solid #eee; font-size: .85rem; }
    td { padding: .55rem .75rem; border-bottom: 1px solid #f2f2f2; font-size: .9rem; }
    tr:last-child td { border-bottom: none; }

    @media (max-width: 600px) {
      nav .search-form input { width: 120px; }
      main { padding: 0 .75rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">snickr</a>
    {% if request.session.user_id %}
      <span class="spacer"></span>
      <form method="get" action="{% url 'search' %}" class="search-form">
        <input type="text" name="q" placeholder="Search messages…">
        <button type="submit">Search</button>
      </form>
      <span class="nav-user">{{ request.session.username }}</span>
      <a href="{% url 'profile' %}">Profile</a>
      <a href="{% url 'logout' %}">Log out</a>
    {% else %}
      <span class="spacer"></span>
      <a href="{% url 'login' %}">Log in</a>
      <a href="{% url 'register' %}">Register</a>
    {% endif %}
  </nav>
  <main>
    {% block breadcrumb %}{% endblock %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
